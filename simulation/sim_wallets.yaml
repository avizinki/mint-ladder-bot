# Simulated wallet registry and lane assignments for T13 harness.
# See docs/trading/mint-ladder-bot-multiwallet-simulation.md.
# sim_runner.py loads sim_wallets.json by default (stdlib); this YAML is the canonical spec format.

wallets:
  - wallet_id: wallet_a
    state: active
  - wallet_id: wallet_b
    state: paused
  - wallet_id: wallet_c
    state: cooldown

lane_assignments:
  - wallet_id: wallet_a
    lane_id: lane_1
    enabled: true
  - wallet_id: wallet_a
    lane_id: lane_2
    enabled: true
  - wallet_id: wallet_b
    lane_id: lane_1
    enabled: true
  - wallet_id: wallet_c
    lane_id: lane_1
    enabled: false
